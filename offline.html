<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#0f1828">
    <meta name="color-scheme" content="light dark">
    <meta name="robots" content="noindex, nofollow">
    <title>オフライン｜秋川流域花火大会【公式】</title>
    <link rel="icon" href="/assets/favicon.ico" sizes="any">
    <style>
      :root{
        --ink:#172026; --paper:#fffdf7; --gold:#d7a947; --red:#b83f37; --night:#10182a;
      }
      @media (prefers-color-scheme: dark) {
        :root{ --ink:#f1eee5; --paper:#0c1320; }
      }
      *{box-sizing:border-box}
      body{
        margin:0; min-height:100vh; display:grid; place-items:center; padding:24px;
        color:var(--ink);
        background:
          radial-gradient(circle at 88% 16%, rgba(215, 169, 71, 0.10), transparent 45%),
          radial-gradient(circle at 12% 84%, rgba(184, 63, 55, 0.06), transparent 50%),
          var(--paper);
        font-family:"Noto Sans JP", system-ui, sans-serif;
        line-height:1.7;
      }
      .wrap{
        max-width:520px; text-align:center;
      }
      .icon{
        width:72px; height:72px; margin: 0 auto 24px;
        display:grid; place-items:center;
        border-radius:50%;
        background:linear-gradient(135deg, rgba(215,169,71,0.18), rgba(184,63,55,0.12));
        border:1px solid rgba(215, 169, 71, 0.4);
        color:var(--gold);
      }
      .icon svg{ display:block }
      h1{
        font-family:"Zen Old Mincho", serif;
        font-size: clamp(1.6rem, 4vw, 2.4rem);
        margin:0 0 16px;
        line-height:1.3;
      }
      p{
        margin:0 0 12px;
        font-size:1rem;
        color: color-mix(in srgb, var(--ink) 78%, transparent);
      }
      .actions{
        display:flex; flex-wrap:wrap; gap:12px; justify-content:center;
        margin-top:28px;
      }
      .btn{
        display:inline-flex; align-items:center; justify-content:center;
        min-height:44px; padding: 0 22px;
        border-radius:999px; font-weight:800; font-size:.94rem;
        text-decoration:none;
        transition: transform .25s ease, box-shadow .25s ease;
      }
      .btn-primary{
        color:var(--night);
        background:linear-gradient(135deg, #ffe8a6, var(--gold) 60%, #c79636);
        box-shadow: 0 8px 22px rgba(215, 169, 71, 0.28);
      }
      .btn-primary:hover{ transform: translateY(-1px); box-shadow: 0 12px 28px rgba(215, 169, 71, 0.42) }
      .btn-secondary{
        color: var(--ink);
        border:1px solid color-mix(in srgb, var(--ink) 18%, transparent);
        background: color-mix(in srgb, var(--paper) 70%, transparent);
      }
      .btn-secondary:hover{ transform: translateY(-1px) }
    </style>
  </head>
  <body>
    <main class="wrap">
      <div class="icon" aria-hidden="true">
        <svg width="34" height="34" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M1 1l22 22"></path>
          <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55"></path>
          <path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39"></path>
          <path d="M10.71 5.05A16 16 0 0 1 22.58 9"></path>
          <path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88"></path>
          <path d="M8.53 16.11a6 6 0 0 1 6.95 0"></path>
          <line x1="12" y1="20" x2="12.01" y2="20"></line>
        </svg>
      </div>
      <h1>オフラインです</h1>
      <p>インターネット接続が確認できません。電波の届く場所で再度お試しください。</p>
      <p>一度ご覧いただいたページは、ネットワークが復旧した時に自動で表示されます。</p>
      <div class="actions">
        <button class="btn btn-primary" type="button" onclick="location.reload()">再読み込み</button>
        <a class="btn btn-secondary" href="/">トップへ戻る</a>
      </div>
    </main>
  </body>
</html>
